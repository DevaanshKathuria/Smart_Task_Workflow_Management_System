services:
  - type: web
    name: stwms-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stwms-db
          property: connectionString
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"

databases:
  - name: stwms-db
    databaseName: stwms_db
    user: stwms_user
